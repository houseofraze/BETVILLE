<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:#0D1310; --surface:#16201C; --surface2:#1B2722; --line:#27352E; --line2:#324036;
  --txt:#E9F0EA; --muted:#8A9690; --faint:#5E6A64;
  --pos:#3DD68C; --neg:#E5705A; --open:#E0B252; --mint:#7FE3B8;
}
*{box-sizing:border-box}
body{margin:0;color:var(--txt);font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.45;
  -webkit-text-size-adjust:100%;padding-bottom:50px;
  background:
    radial-gradient(1100px 460px at 50% -160px,#1A2823 0%,rgba(13,19,16,0) 62%),
    radial-gradient(700px 300px at 100% 0,#15201C 0%,rgba(13,19,16,0) 55%),
    var(--bg);
  background-attachment:fixed;}
.num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 40px}
h1{font-family:'Space Grotesk';font-weight:700;font-size:20px;letter-spacing:-.01em;margin:0;display:flex;align-items:center;gap:9px}
.dot{width:9px;height:9px;border-radius:3px;background:var(--mint);box-shadow:0 0 12px var(--mint)}
.sub{color:var(--muted);font-size:12.5px;margin:3px 0 0}
.eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;font-family:'Space Grotesk'}
.card{background:linear-gradient(180deg,#19241F,#141D1A);border:1px solid var(--line);border-radius:15px;padding:16px;margin:14px 0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.025), 0 12px 30px -22px rgba(0,0,0,.8)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px}
button{font-family:inherit;cursor:pointer}
.btn{background:var(--mint);color:#06241A;border:none;border-radius:10px;padding:10px 14px;font-weight:600;font-size:14px}
.btn.ghost{background:rgba(127,227,184,.05);color:var(--mint);border:1px solid var(--line2)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:8px}
.btn.danger{background:transparent;color:var(--neg);border:1px solid #3a2a27}
input,select{font-family:inherit;font-size:14px;background:var(--surface2);color:var(--txt);border:1px solid var(--line);
  border-radius:9px;padding:9px 10px;width:100%}
input:focus,select:focus{outline:2px solid var(--mint);outline-offset:-1px}
label{display:block;font-size:11px;color:var(--muted);margin:0 0 4px;font-weight:500}
/* hero */
.hero{position:relative;overflow:hidden;background:
   radial-gradient(420px 200px at 12% -20%,rgba(127,227,184,.10),rgba(0,0,0,0) 70%),
   linear-gradient(165deg,#1A2722,#111A17);
  border:1px solid var(--line2);border-radius:18px;padding:22px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 18px 44px -26px rgba(0,0,0,.85)}
.pl{font-family:'Space Grotesk';font-weight:700;font-size:48px;letter-spacing:-.02em;line-height:1}
.pl.pos{color:var(--pos);text-shadow:0 0 30px rgba(61,214,140,.25)}
.pl.neg{color:var(--neg);text-shadow:0 0 30px rgba(229,112,90,.22)}
.herometa{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:18px}
.metric{background:rgba(8,13,11,.55);border:1px solid var(--line);border-radius:11px;padding:9px 10px}
.metric .k{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}
.metric .v{font-family:'Space Grotesk';font-weight:600;font-size:18px;margin-top:3px}
.pips{display:flex;gap:5px;margin-top:16px;flex-wrap:wrap;align-items:center}
.pip{width:13px;height:13px;border-radius:4px}
.pip.w{background:var(--pos);box-shadow:0 0 8px rgba(61,214,140,.4)} .pip.l{background:var(--neg)}
/* chart */
.chartwrap{margin-top:12px;border-radius:10px;overflow:hidden}
svg.curve{display:block;width:100%;height:172px}
.xlab{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--faint)}
/* badges + chips */
.badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:6px;font-family:'Space Grotesk';letter-spacing:.02em;display:inline-block;white-space:nowrap}
.b-won{background:rgba(61,214,140,.15);color:var(--pos)} .b-lost{background:rgba(229,112,90,.15);color:var(--neg)}
.b-open{background:rgba(224,178,82,.15);color:var(--open)} .b-void{background:rgba(138,150,144,.15);color:var(--muted)}
.chip{font-family:'Space Grotesk';font-size:11px;padding:1px 7px;border-radius:5px;background:#0f1714;border:1px solid var(--line);
  color:var(--muted);margin-left:6px;font-variant-numeric:tabular-nums;white-space:nowrap}
.c-hit{color:var(--pos);border-color:rgba(61,214,140,.3)} .c-miss{color:var(--neg);border-color:rgba(229,112,90,.3)}
/* bets */
.bet{border:1px solid var(--line);border-radius:12px;margin:9px 0;background:var(--surface2);overflow:hidden}
.bethead{padding:12px 14px;display:flex;justify-content:space-between;gap:10px;align-items:center;cursor:pointer}
.bethead:hover{background:#1f2c26}
.bet .match{font-weight:600;font-size:14.5px}
.bet .meta{color:var(--muted);font-size:12px;margin-top:2px}
.bet .pl{font-size:16px;text-align:right;white-space:nowrap;font-family:'Space Grotesk';font-variant-numeric:tabular-nums}
.body{padding:0 14px 14px;border-top:1px solid var(--line);display:none}
.bet.open-row .body{display:block}
.leg{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #20302a}
.legtxt{flex:1;min-width:0}
.legtxt .lt{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em}
.legtxt .ls{font-size:13.5px;margin-top:1px}
.legact{width:60px;flex:none;text-align:center;padding:7px 4px}
.legres{width:96px;flex:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.calrow{display:flex;align-items:center;gap:10px;margin:9px 0}
.callabel{width:118px;flex:none;font-size:12.5px}
.calbar{flex:1;height:22px;background:#0f1714;border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--line)}
.calfill{height:100%;border-radius:5px;transition:width .4s ease}
.calval{width:78px;flex:none;text-align:right;font-family:'Space Grotesk';font-size:13px;font-variant-numeric:tabular-nums}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.hint{font-size:12px;color:var(--muted);margin-top:8px}
.legrow-edit{display:flex;gap:7px;margin-bottom:7px}
.le-type{flex:1.2} .le-sel{flex:1.5} .le-line{width:62px;flex:none}
.divlabel{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 8px;font-family:'Space Grotesk';font-weight:600}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--mint);color:#06241A;padding:10px 18px;
  border-radius:10px;font-weight:600;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;box-shadow:0 10px 30px -8px rgba(0,0,0,.7)}
.toast.show{opacity:1}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:46px;height:46px;border-radius:12px;background:#fff;flex:none;padding:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px -9px rgba(0,0,0,.75), inset 0 0 0 1px rgba(255,255,255,.6)}
.logo img{width:100%;height:100%;object-fit:contain;display:block}
@media(max-width:560px){ .herometa{grid-template-columns:repeat(2,1fr)} .pl{font-size:42px} .callabel{width:92px} .legres{width:88px} }
</style>

function deriveRes(type,line,actual){
  if(actual===''||actual==null||isNaN(+actual)) return null;
  const a=+actual, L=(line==null||line==='')?1:+line;
  if(type==='Total Goals (Over)') return a>L?'Hit':'Miss';
  if(type==='Result Handicap (Win by 2+)') return a>=2?'Hit':'Miss';
  return a>=L?'Hit':'Miss';
}

function stats(){
  const settled=state.bets.filter(b=>b.status==='Won'||b.status==='Lost');
  let staked=0,returned=0,net=0,wins=0,losses=0;
  settled.forEach(b=>{ staked+=b.stake;
    if(b.status==='Won'){ returned+=(b.ret||0); net+=(b.ret||0)-b.stake; wins++; }
    else { net-=b.stake; losses++; } });
  const openRisk=state.bets.filter(b=>b.status==='Open').reduce((s,b)=>s+(b.stake||0),0);
  return {staked,returned,net,wins,losses,roi:staked?net/staked:0,pts:net/(state.settings.pointSize||10),openRisk,n:settled.length};
}
function legStats(){
  return LEG_TYPES.map(t=>{
    const ls=state.legs.filter(l=>l.type===t&&(l.res==='Hit'||l.res==='Miss'));
    const hits=ls.filter(l=>l.res==='Hit').length;
    return {type:t,n:ls.length,hits,rate:ls.length?hits/ls.length:null};
  }).filter(x=>x.n>0);
}
const money=n=>(n<0?'-$':'$')+Math.abs(n).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
const signed=n=>(n>=0?'+':'-')+'$'+Math.abs(n).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>(n>=0?'+':'')+(n*100).toFixed(1)+'%';
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function badge(st){ const m={Won:'b-won',Lost:'b-lost',Open:'b-open',Void:'b-void'}; return `<span class="badge ${m[st]||'b-void'}">${st}</span>`; }

function render(){ renderHero(); renderChart(); renderStaking(); renderAdd(); renderBets(); renderCalibration(); }

function renderHero(){
  const s=stats(); const cls=s.net>=0?'pos':'neg';
  const pips=state.bets.filter(b=>['Won','Lost'].includes(b.status)).sort((a,b)=>a.id-b.id)
    .map(b=>`<span class="pip ${b.status==='Won'?'w':'l'}"></span>`).join('');
  document.getElementById('hero').innerHTML=`
    <div class="eyebrow">Net profit · settled</div>
    <div class="pl ${cls} num">${signed(s.net)}</div>
    <div class="herometa">
      <div class="metric"><div class="k">ROI</div><div class="v num" style="color:var(--${s.roi>=0?'pos':'neg'})">${pct(s.roi)}</div></div>
      <div class="metric"><div class="k">Points</div><div class="v num">${(s.pts>=0?'+':'')+s.pts.toFixed(1)}</div></div>
      <div class="metric"><div class="k">Record</div><div class="v num">${s.wins}<span class="faint">–</span>${s.losses}</div></div>
      <div class="metric"><div class="k">Open at risk</div><div class="v num" style="color:var(--open)">$${s.openRisk.toFixed(0)}</div></div>
    </div>
    <div class="pips">${pips||'<span class="faint" style="font-size:12px">No settled bets yet</span>'}</div>`;
}
function renderChart(){
  const s=stats();
  document.getElementById('chartcard').innerHTML=`
    <div class="spread"><div class="eyebrow">Profit curve</div>
      <div class="num" style="font-size:15px;color:var(--${s.net>=0?'pos':'neg'})">${signed(s.net)}</div></div>
    <div class="chartwrap">${profitCurve()}</div>`;
}
function profitCurve(){
  const settled=state.bets.filter(b=>b.status==='Won'||b.status==='Lost').sort((a,b)=>a.id-b.id);
  if(!settled.length) return '<p class="hint">Settle a few bets to draw the curve.</p>';
  const pts=[{v:0,label:'Start'}]; let run=0;
  settled.forEach(b=>{ run+=b.status==='Won'?(b.ret||0)-b.stake:-b.stake; pts.push({v:run,label:b.match}); });
  const W=600,H=172,pad=10,padB=8,padT=12;
  const vals=pts.map(p=>p.v); let mn=Math.min(0,...vals),mx=Math.max(0,...vals); if(mn===mx){mn-=1;mx+=1;}
  const X=i=>pad+(pts.length<2?0:i/(pts.length-1)*(W-2*pad));
  const Y=v=>padT+(mx-v)/(mx-mn)*(H-padT-padB);
  const line=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)} ${Y(p.v).toFixed(1)}`).join(' ');
  const area=`${line} L${X(pts.length-1).toFixed(1)} ${(H-padB).toFixed(1)} L${X(0).toFixed(1)} ${(H-padB).toFixed(1)} Z`;
  const zY=Y(0).toFixed(1); const last=pts[pts.length-1]; const up=last.v>=0; const col=up?'#3DD68C':'#E5705A';
  return `<svg class="curve" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="grad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${col}" stop-opacity=".30"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <line x1="${pad}" x2="${W-pad}" y1="${zY}" y2="${zY}" stroke="#33453B" stroke-width="1" stroke-dasharray="3 4" vector-effect="non-scaling-stroke"/>
    <path d="${area}" fill="url(#grad)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>
  <div class="xlab"><span>Start</span><span>${esc(last.label).slice(0,22)}</span></div>`;
}
function renderStaking(){
  const bk=state.settings.bankroll||0,u=state.settings.unitPct,c=state.settings.ceilingPct;
  document.getElementById('staking').innerHTML=`
    <div class="eyebrow">Staking calculator</div>
    <div class="row" style="margin-top:10px;align-items:flex-end">
      <div style="flex:1;min-width:120px"><label>Current bankroll (incl. open stakes)</label><input id="bk" class="num" type="number" inputmode="decimal" value="${bk}"></div>
      <div style="width:74px"><label>Std %</label><input id="up" class="num" type="number" value="${u}"></div>
      <div style="width:74px"><label>Cap %</label><input id="cp" class="num" type="number" value="${c}"></div>
    </div>
    <div class="grid2" style="margin-top:12px">
      <div class="metric"><div class="k">Standard bet (${u}%)</div><div class="v num" style="color:var(--mint)">$${(bk*u/100).toFixed(2)}</div></div>
      <div class="metric"><div class="k">Hard ceiling (${c}%)</div><div class="v num">$${(bk*c/100).toFixed(2)}</div></div>
    </div>
    <p class="hint">Re-base the bankroll when it moves ±25–50%. One size for every bet — set by merit, not the badge.</p>`;
}
function legEditRow(){
  return `<div class="legrow-edit" data-leg-edit>
    <select class="le-type">${LEG_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    <input class="le-line" type="number" inputmode="numeric" placeholder="line">
    <input class="le-sel" placeholder="selection">
  </div>`;
}
function renderAdd(){
  const card=document.getElementById('addcard'); card.style.display=addOpen?'block':'none';
  if(!addOpen){card.innerHTML='';return;}
  card.innerHTML=`
    <div class="eyebrow">Log a new bet</div>
    <div class="grid2" style="margin-top:10px">
      <div><label>Match date</label><input id="f-date" placeholder="24 Jun"></div>
      <div><label>Bet type</label><input id="f-type" value="Single SGM"></div>
    </div>
    <div style="margin-top:10px"><label>Match / description</label><input id="f-match" placeholder="England v Ghana"></div>
    <div class="grid3" style="margin-top:10px">
      <div><label>Combined odds</label><input id="f-odds" class="num" type="number" inputmode="decimal" placeholder="3.00"></div>
      <div><label>Stake ($)</label><input id="f-stake" class="num" type="number" inputmode="decimal" placeholder="10"></div>
      <div><label>Status</label><select id="f-status">${STATUSES.map(s=>`<option ${s==='Open'?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="divlabel">Legs <span class="faint" style="text-transform:none;letter-spacing:0">— line = the threshold, e.g. 1 for "1+ shots"</span></div>
    <div id="legEdits">${[0,1,2].map(legEditRow).join('')}</div>
    <button class="btn ghost sm" data-action="add-leg-row" style="margin-top:4px">+ Another leg</button>
    <div style="margin-top:12px"><label>Notes</label><input id="f-notes" placeholder="optional"></div>
    <div class="row" style="margin-top:14px">
      <button class="btn" data-action="save-bet">Save bet</button>
      <button class="btn ghost" data-action="toggle-add">Cancel</button>
    </div>`;
}
function betCard(b){
  const legs=state.legs.filter(l=>l.betId===b.id);
  const pl=(b.status==='Won')?(b.ret||0)-b.stake:(b.status==='Lost'?-b.stake:null);
  const plHtml=pl===null?`<span class="faint" style="font-size:13px">$${(b.stake||0).toFixed(0)} on</span>`
    :`<span style="color:var(--${pl>=0?'pos':'neg'})">${signed(pl)}</span>`;
  const open=expanded[b.id];
  const legList=legs.map(l=>{
    const chip=l.line!=null?`<span class="chip ${l.res==='Hit'?'c-hit':l.res==='Miss'?'c-miss':''}">${l.line}+${l.actual!=null?' · '+l.actual:''}</span>`:'';
    return `<div class="leg">
      <div class="legtxt"><div class="lt">${esc(l.type)}</div><div class="ls">${esc(l.sel)}${chip}</div></div>
      ${NUMERIC.has(l.type)?`<input class="legact num" type="number" inputmode="numeric" data-leg-act="${l.id}" value="${l.actual==null?'':l.actual}" placeholder="got">`:''}
      <select class="legres" data-leg-res="${l.id}">${RESULTS.map(r=>`<option ${r===l.res?'selected':''}>${r}</option>`).join('')}</select>
    </div>`;}).join('')||'<p class="hint">No legs recorded.</p>';
  return `<div class="bet ${open?'open-row':''}" data-bet="${b.id}">
    <div class="bethead" data-action="toggle-bet" data-id="${b.id}">
      <div style="min-width:0"><div class="match">${esc(b.match)}</div>
        <div class="meta">${esc(b.date)} · ${esc(b.type)} · <span class="num">@${(b.odds||0).toFixed(2)}</span> · ${badge(b.status)}</div></div>
      <div class="pl">${plHtml}</div>
    </div>
    <div class="body">
      ${legList}
      <div class="grid3" style="margin-top:12px">
        <div><label>Status</label><select data-edit="status" data-id="${b.id}">${STATUSES.map(s=>`<option ${s===b.status?'selected':''}>${s}</option>`).join('')}</select></div>
        <div><label>Stake ($)</label><input class="num" type="number" data-edit="stake" data-id="${b.id}" value="${b.stake}"></div>
        <div><label>Return ($)</label><input class="num" type="number" data-edit="ret" data-id="${b.id}" value="${b.ret==null?'':b.ret}" placeholder="if won"></div>
      </div>
      <div style="margin-top:10px"><label>Notes</label><input data-edit="notes" data-id="${b.id}" value="${esc(b.notes)}"></div>
      <div class="row" style="margin-top:12px">
        <button class="btn sm" data-action="save-edit" data-id="${b.id}">Save changes</button>
        <button class="btn danger sm" data-action="del-bet" data-id="${b.id}">Delete</button>
      </div>
    </div></div>`;
}
function renderBets(){
  const open=state.bets.filter(b=>b.status==='Open'), settled=state.bets.filter(b=>b.status!=='Open');
  document.getElementById('openSection').innerHTML=open.length?`<div class="card"><div class="eyebrow">Open · ${open.length}</div>${open.map(betCard).join('')}</div>`:'';
  document.getElementById('settledSection').innerHTML=settled.length?`<div class="card"><div class="eyebrow">Settled · ${settled.length}</div>${settled.map(betCard).join('')}</div>`:'';
}
function renderCalibration(){
  const ls=legStats();
  const rows=ls.map(x=>{ const r=x.rate,col=r>=.75?'var(--pos)':r>=.5?'var(--open)':'var(--neg)';
    return `<div class="calrow"><div class="callabel">${esc(x.type)}</div>
      <div class="calbar"><div class="calfill" style="width:${(r*100).toFixed(0)}%;background:${col}"></div></div>
      <div class="calval">${(r*100).toFixed(0)}% <span class="faint">${x.hits}/${x.n}</span></div></div>`;
  }).join('')||'<p class="hint">Settle some legs to see hit-rates build.</p>';
  document.getElementById('calibration').innerHTML=`
    <div class="eyebrow">Which leg types convert</div>
    <p class="hint" style="margin:6px 0 12px">Settled legs only — the calibration engine.</p>${rows}`;
}

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600); }

document.addEventListener('click',e=>{
  const a=e.target.closest('[data-action]'); if(!a) return;
  const act=a.dataset.action,id=+a.dataset.id;
  if(act==='toggle-add'){ addOpen=!addOpen; renderAdd(); if(addOpen) document.getElementById('addcard').scrollIntoView({behavior:'smooth',block:'nearest'}); }
  else if(act==='toggle-bet'){ expanded[id]=!expanded[id]; renderBets(); }
  else if(act==='add-leg-row'){ document.getElementById('legEdits').insertAdjacentHTML('beforeend',legEditRow()); }
  else if(act==='save-bet'){ saveBet(); }
  else if(act==='save-edit'){ saveEdit(id); }
  else if(act==='del-bet'){ delBet(id); }
  else if(act==='export'){ exportData(); }
});
document.addEventListener('change',e=>{
  if(e.target.id==='importfile'&&e.target.files&&e.target.files[0]){
    const rd=new FileReader();
    rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
      if(d&&Array.isArray(d.bets)){ state=d; if(!state.settings) state.settings=JSON.parse(JSON.stringify(SEED.settings)); if(!Array.isArray(state.legs)) state.legs=[]; save(); render(); toast('Backup imported'); }
      else toast('Invalid backup file'); }catch(err){ toast('Could not read that file'); } };
    rd.readAsText(e.target.files[0]); e.target.value=''; return;
  }
  const la=e.target.closest('[data-leg-act]');
  if(la){ const leg=state.legs.find(l=>l.id===+la.dataset.legAct); if(leg){
    leg.actual=la.value===''?null:+la.value;
    const d=deriveRes(leg.type,leg.line,leg.actual); if(d) leg.res=d;
    save(); renderHero(); renderChart(); renderCalibration(); renderBets(); } return; }
  const lr=e.target.closest('[data-leg-res]');
  if(lr){ const leg=state.legs.find(l=>l.id===+lr.dataset.legRes); if(leg){ leg.res=lr.value; save(); renderHero(); renderChart(); renderCalibration(); renderBets(); } return; }
  if(['bk','up','cp'].includes(e.target.id)){
    state.settings.bankroll=+document.getElementById('bk').value||0;
    state.settings.unitPct=+document.getElementById('up').value||2;
    state.settings.ceilingPct=+document.getElementById('cp').value||5;
    save(); renderStaking();
  }
});
function saveBet(){
  const g=id=>document.getElementById(id);
  const match=g('f-match').value.trim(); if(!match){ toast('Add a match name'); return; }
  const status=g('f-status').value;
  const bet={id:nextId(state.bets),date:g('f-date').value.trim()||'—',type:g('f-type').value.trim()||'Single SGM',
    match,odds:+g('f-odds').value||0,stake:+g('f-stake').value||0,status,ret:status==='Won'?0:null,notes:g('f-notes').value.trim()};
  state.bets.unshift(bet);
  document.querySelectorAll('#legEdits [data-leg-edit]').forEach(row=>{
    const sel=row.querySelector('.le-sel').value.trim(); if(!sel) return;
    const lineV=row.querySelector('.le-line').value;
    state.legs.push({id:nextId(state.legs),betId:bet.id,type:row.querySelector('.le-type').value,sel,
      line:lineV===''?null:+lineV,actual:null,res:status==='Open'?'Pending':'Hit'});
  });
  addOpen=false; expanded[bet.id]=true; save(); render(); toast('Bet logged');
}
function saveEdit(id){
  const b=state.bets.find(x=>x.id===id); if(!b) return;
  const get=k=>document.querySelector(`[data-edit="${k}"][data-id="${id}"]`);
  b.status=get('status').value; b.stake=+get('stake').value||0;
  const rv=get('ret').value; b.ret=rv===''?(b.status==='Won'?0:null):+rv;
  if(b.status==='Lost') b.ret=0; if(b.status==='Open') b.ret=null;
  b.notes=get('notes').value.trim(); save(); render(); toast('Saved');
}
function delBet(id){ state.bets=state.bets.filter(b=>b.id!==id); state.legs=state.legs.filter(l=>l.betId!==id); delete expanded[id]; save(); render(); toast('Deleted'); }

(async function init(){
  state=await load();
  if(!state||!state.bets){ state=JSON.parse(JSON.stringify(SEED)); save(); }
  render();
  if(!hasStorage){ document.querySelector('.wrap').insertAdjacentHTML('afterbegin',
    '<div class="card" style="border-color:#3a2a27;color:var(--open)"><b>Heads up:</b> this browser is blocking storage (private mode?), so changes won\u2019t persist. Export a backup to keep your data.</div>'); }
})();
</script>
